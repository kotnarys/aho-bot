<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>АХО Бот — Debug View</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #08080c;
            --bg-panel: #0e0e14;
            --bg-card: #141420;
            --bg-input: #1a1a2a;
            --border: #252538;
            --border-active: #3d3d5c;
            --text: #e4e4f0;
            --text-dim: #6e6e8a;
            --text-muted: #44445a;
            --accent: #7c6cf0;
            --accent-soft: rgba(124, 108, 240, 0.15);
            --accent-glow: rgba(124, 108, 240, 0.25);
            --green: #34d399;
            --green-soft: rgba(52, 211, 153, 0.12);
            --yellow: #fbbf24;
            --yellow-soft: rgba(251, 191, 36, 0.12);
            --red: #f87171;
            --blue: #60a5fa;
            --blue-soft: rgba(96, 165, 250, 0.12);
            --orange: #fb923c;
            --orange-soft: rgba(251, 146, 60, 0.12);
            --cyan: #22d3ee;
            --cyan-soft: rgba(34, 211, 238, 0.12);
            --radius: 12px;
            --radius-sm: 8px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── Header ──────────────────────── */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            border-bottom: 1px solid var(--border);
            background: var(--bg-panel);
            z-index: 20;
            flex-shrink: 0;
        }

        .header-left { display: flex; align-items: center; gap: 10px; }

        .logo {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, var(--accent), #a78bfa);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; font-weight: 800;
            box-shadow: 0 2px 16px var(--accent-glow);
        }

        .header-title h1 { font-size: 15px; font-weight: 700; letter-spacing: -0.3px; }
        .header-title span { font-size: 11px; color: var(--text-dim); }

        .header-controls { display: flex; align-items: center; gap: 10px; }

        .employee-select {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 6px 10px;
            border-radius: var(--radius-sm);
            font-family: 'Outfit', sans-serif;
            font-size: 12px;
            outline: none;
            cursor: pointer;
        }
        .employee-select:focus { border-color: var(--accent); }

        .status-dot-live {
            display: flex; align-items: center; gap: 5px;
            font-size: 11px; color: var(--green); font-weight: 600;
        }
        .status-dot-live::before {
            content: '';
            width: 6px; height: 6px;
            background: var(--green);
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

        /* ── Main layout ─────────────────── */
        .main-layout {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        /* ── Left: user chat ─────────────── */
        .panel-user {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
            min-width: 0;
        }

        .panel-header {
            padding: 10px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--bg-panel);
            flex-shrink: 0;
        }

        .panel-label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-dim);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .panel-label .dot {
            width: 8px; height: 8px; border-radius: 50%;
        }

        /* ── Step progress ────────────────── */
        .step-progress {
            display: flex;
            align-items: center;
            gap: 2px;
            font-size: 10px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        .step-pip {
            padding: 3px 8px;
            border-radius: 4px;
            transition: all 0.3s;
        }
        .step-pip.active { background: var(--accent-soft); color: var(--accent); }
        .step-pip.done { color: var(--green); }
        .step-arrow { color: var(--text-muted); font-size: 9px; }

        /* ── Chat messages ────────────────── */
        .chat-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px;
        }
        .chat-scroll::-webkit-scrollbar { width: 3px; }
        .chat-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        .msg { margin-bottom: 16px; animation: fadeIn 0.25s ease; }
        @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

        .msg-user { display: flex; justify-content: flex-end; }
        .msg-bot { display: flex; gap: 10px; }

        .msg-avatar {
            width: 32px; height: 32px;
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; flex-shrink: 0;
            background: linear-gradient(135deg, var(--accent), #a78bfa);
            box-shadow: 0 2px 8px var(--accent-glow);
        }

        .msg-bubble {
            padding: 12px 16px;
            border-radius: var(--radius);
            font-size: 13px;
            line-height: 1.65;
            max-width: 480px;
            white-space: pre-wrap;
        }

        .msg-bot .msg-bubble {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }

        .msg-user .msg-bubble {
            background: var(--accent);
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .msg-bubble strong { font-weight: 600; }

        /* Typing indicator */
        .typing { display: none; gap: 10px; margin-bottom: 16px; }
        .typing.show { display: flex; }
        .typing-dots { display: flex; gap: 3px; padding: 12px 16px; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); border-bottom-left-radius: 4px; }
        .typing-dots span { width: 5px; height: 5px; background: var(--text-dim); border-radius: 50%; animation: typAnim 1.4s ease-in-out infinite; }
        .typing-dots span:nth-child(2) { animation-delay: .2s; }
        .typing-dots span:nth-child(3) { animation-delay: .4s; }
        @keyframes typAnim { 0%,100%{transform:translateY(0);opacity:.3} 50%{transform:translateY(-3px);opacity:1} }

        /* Quick replies */
        .quick-area { padding: 8px 16px 4px; display: flex; flex-wrap: wrap; gap: 6px; flex-shrink: 0; }
        .qr-btn {
            padding: 7px 14px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 18px;
            color: var(--text);
            font-size: 12px;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
            transition: all 0.15s;
        }
        .qr-btn:hover { border-color: var(--accent); background: var(--accent-soft); transform: translateY(-1px); }
        .qr-btn.confirm { border-color: var(--green); color: var(--green); }
        .qr-btn.cancel { border-color: var(--red); color: var(--red); }

        /* Input */
        .input-bar { padding: 12px 16px; border-top: 1px solid var(--border); background: var(--bg-panel); flex-shrink: 0; }
        .input-row { display: flex; gap: 10px; }
        .input-row input {
            flex: 1;
            padding: 12px 16px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 13px;
            font-family: 'Outfit', sans-serif;
            outline: none;
            transition: border-color 0.2s;
        }
        .input-row input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
        .input-row input::placeholder { color: var(--text-muted); }
        .send-btn {
            width: 44px; height: 44px;
            background: linear-gradient(135deg, var(--accent), #a78bfa);
            border: none; border-radius: 10px;
            color: #fff; font-size: 16px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.15s;
            box-shadow: 0 2px 12px var(--accent-glow);
        }
        .send-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 20px var(--accent-glow); }

        /* ── Right: debug panel ──────────── */
        .panel-debug {
            width: 520px;
            display: flex;
            flex-direction: column;
            background: var(--bg-panel);
            flex-shrink: 0;
        }

        .debug-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }
        .debug-scroll::-webkit-scrollbar { width: 3px; }
        .debug-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        /* Debug tabs */
        .debug-tabs {
            display: flex;
            gap: 2px;
            padding: 8px 12px;
            border-bottom: 1px solid var(--border);
            background: var(--bg-panel);
            flex-shrink: 0;
        }
        .debug-tab {
            padding: 5px 12px;
            font-size: 11px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            color: var(--text-dim);
            transition: all 0.15s;
            border: none;
            background: none;
            font-family: 'Outfit', sans-serif;
        }
        .debug-tab:hover { color: var(--text); background: var(--bg-card); }
        .debug-tab.active { color: var(--accent); background: var(--accent-soft); }

        .debug-tab-content { display: none; }
        .debug-tab-content.active { display: block; }

        /* Trace entry */
        .trace-entry {
            margin-bottom: 8px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            overflow: hidden;
            background: var(--bg);
        }

        .trace-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            transition: background 0.1s;
        }
        .trace-header:hover { background: var(--bg-card); }

        .trace-icon {
            width: 22px; height: 22px;
            border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            font-size: 10px;
            flex-shrink: 0;
        }

        .trace-icon.node { background: var(--blue-soft); color: var(--blue); }
        .trace-icon.llm { background: var(--accent-soft); color: var(--accent); }
        .trace-icon.rag { background: var(--cyan-soft); color: var(--cyan); }
        .trace-icon.decision { background: var(--yellow-soft); color: var(--yellow); }
        .trace-icon.fields { background: var(--green-soft); color: var(--green); }
        .trace-icon.submit { background: var(--orange-soft); color: var(--orange); }

        .trace-label { flex: 1; }
        .trace-duration { font-size: 10px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; }
        .trace-chevron { color: var(--text-muted); font-size: 10px; transition: transform 0.2s; }
        .trace-entry.open .trace-chevron { transform: rotate(90deg); }

        .trace-body {
            display: none;
            padding: 0 12px 10px;
            border-top: 1px solid var(--border);
        }
        .trace-entry.open .trace-body { display: block; padding-top: 10px; }

        .trace-body pre {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            line-height: 1.5;
            color: var(--text-dim);
            white-space: pre-wrap;
            word-break: break-word;
        }

        .trace-body .kv { margin-bottom: 6px; }
        .trace-body .kv-key { color: var(--text-muted); font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; }
        .trace-body .kv-val { font-size: 12px; color: var(--text); }
        .trace-body .kv-val.highlight { color: var(--accent); font-weight: 600; }
        .trace-body .kv-val.success { color: var(--green); }
        .trace-body .kv-val.code {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            background: var(--bg-card);
            padding: 8px 10px;
            border-radius: 6px;
            display: block;
            margin-top: 4px;
            border: 1px solid var(--border);
            max-height: 200px;
            overflow-y: auto;
        }

        /* JSON tab */
        .json-display {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            line-height: 1.6;
            white-space: pre-wrap;
            color: var(--text-dim);
            padding: 8px;
        }

        /* Placeholder */
        .debug-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 200px;
            color: var(--text-muted);
            font-size: 13px;
            text-align: center;
            gap: 8px;
        }
        .debug-placeholder .icon { font-size: 28px; opacity: 0.4; }

        /* ── Responsive ──────────────────── */
        @media (max-width: 900px) {
            .panel-debug { display: none; }
        }
    </style>
</head>
<body>

<!-- Header -->
<div class="header">
    <div class="header-left">
        <div class="logo">А</div>
        <div class="header-title">
            <h1>АХО Бот</h1>
            <span>LangGraph + RAG + Structured Output</span>
        </div>
    </div>
    <div class="header-controls">
        <select class="employee-select" id="empSelect">
            <option value="">— Гость —</option>
            <option value="a.ivanov@company.ru">Иванов Алексей (Разработка)</option>
            <option value="m.petrova@company.ru">Петрова Мария (Маркетинг)</option>
            <option value="a.volkov@company.ru">Волков Артём (Продажи)</option>
            <option value="k.morozov@company.ru">Морозов Кирилл (Логистика)</option>
            <option value="d.orlova@company.ru">Орлова Дарья (Дизайн)</option>
            <option value="p.andreev@company.ru">Андреев Павел (IT)</option>
        </select>
        <button class="qr-btn" onclick="resetChat()" style="font-size:11px; padding:5px 12px;">🔄 Новый чат</button>
        <div class="status-dot-live">Online</div>
    </div>
</div>

<div class="main-layout">

    <!-- LEFT: User Chat -->
    <div class="panel-user">
        <div class="panel-header">
            <div class="panel-label"><span class="dot" style="background:var(--green)"></span> Чат с пользователем</div>
            <div class="step-progress" id="stepProgress">
                <span class="step-pip active" data-s="greeting">Старт</span>
                <span class="step-arrow">›</span>
                <span class="step-pip" data-s="classify">Intent</span>
                <span class="step-arrow">›</span>
                <span class="step-pip" data-s="collect">Сбор</span>
                <span class="step-arrow">›</span>
                <span class="step-pip" data-s="confirm">Проверка</span>
                <span class="step-arrow">›</span>
                <span class="step-pip" data-s="submit">Готово</span>
            </div>
        </div>

        <div class="chat-scroll" id="chatScroll">
            <div class="typing" id="typing">
                <div class="msg-avatar">🤖</div>
                <div class="typing-dots"><span></span><span></span><span></span></div>
            </div>
        </div>

        <div class="quick-area" id="quickArea">
            <button class="qr-btn" onclick="send('Закажи ручки и блокнот')">📦 Канцтовары</button>
            <button class="qr-btn" onclick="send('Нужна корпоративная симка')">📱 SIM-карта</button>
            <button class="qr-btn" onclick="send('Еду в командировку в Питер')">✈️ Командировка</button>
            <button class="qr-btn" onclick="send('Оформи пропуск на парковку')">🅿️ Парковка</button>
            <button class="qr-btn" onclick="send('Такси до Шереметьево')">🚕 Такси</button>
            <button class="qr-btn" onclick="send('Кофемашина не работает')">⚠️ Непорядок!</button>
        </div>

        <div class="input-bar">
            <div class="input-row">
                <input type="text" id="msgInput" placeholder="Напиши, что нужно..." autocomplete="off" autofocus>
                <button class="send-btn" onclick="sendFromInput()">↑</button>
            </div>
        </div>
    </div>

    <!-- RIGHT: Debug Panel -->
    <div class="panel-debug">
        <div class="panel-header">
            <div class="panel-label"><span class="dot" style="background:var(--accent)"></span> Внутрянка бота</div>
        </div>

        <div class="debug-tabs">
            <button class="debug-tab active" onclick="switchTab('trace')">🔍 Trace</button>
            <button class="debug-tab" onclick="switchTab('json')">{ } JSON</button>
            <button class="debug-tab" onclick="switchTab('state')">📊 State</button>
        </div>

        <div class="debug-scroll" id="debugScroll">
            <!-- Trace tab -->
            <div class="debug-tab-content active" id="tab-trace">
                <div class="debug-placeholder" id="tracePlaceholder">
                    <div class="icon">🔬</div>
                    Отправь сообщение, чтобы увидеть<br>внутреннюю работу бота
                </div>
                <div id="traceList"></div>
            </div>

            <!-- JSON tab -->
            <div class="debug-tab-content" id="tab-json">
                <div class="json-display" id="jsonDisplay">Заявка ещё не создана</div>
            </div>

            <!-- State tab -->
            <div class="debug-tab-content" id="tab-state">
                <div class="json-display" id="stateDisplay">Состояние не инициализировано</div>
            </div>
        </div>
    </div>

</div>

<script>
const API = window.location.origin + '/api/chat';
let sessionId = null;
let msgNum = 0;
let currentEmail = null;

// ── Chat ──────────────────────────────────────────

function addMsg(text, type) {
    const scroll = document.getElementById('chatScroll');
    const typing = document.getElementById('typing');
    const div = document.createElement('div');
    div.className = 'msg msg-' + type;

    if (type === 'bot') {
        div.innerHTML = `
            <div class="msg-avatar">🤖</div>
            <div class="msg-bubble">${esc(text)}</div>
        `;
    } else {
        div.innerHTML = `<div class="msg-bubble">${esc(text)}</div>`;
    }
    scroll.insertBefore(div, typing);
    scroll.scrollTop = scroll.scrollHeight;
}

function clearChat() {
    const scroll = document.getElementById('chatScroll');
    const typing = document.getElementById('typing');
    scroll.innerHTML = '';
    scroll.appendChild(typing);
    document.getElementById('traceList').innerHTML = '';
    document.getElementById('tracePlaceholder').style.display = 'flex';
    document.getElementById('jsonDisplay').textContent = 'Заявка ещё не создана';
    document.getElementById('stateDisplay').textContent = '{}';
    msgNum = 0;
    sessionId = null;
}

function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
            .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
}

function showTyping() { document.getElementById('typing').classList.add('show'); }
function hideTyping() { document.getElementById('typing').classList.remove('show'); }

function updateStep(step) {
    const steps = ['greeting','classify','collect','confirm','submit'];
    const isDone = (step === 'done');
    document.querySelectorAll('.step-pip').forEach((el, i) => {
        el.classList.remove('active','done');
        if (isDone) { el.classList.add('done'); return; }
        const idx = steps.indexOf(step);
        if (i < idx) el.classList.add('done');
        if (i === idx) el.classList.add('active');
    });

    const qa = document.getElementById('quickArea');
    if (step === 'greeting' || step === 'done') {
        qa.innerHTML = `
            <button class="qr-btn" onclick="send('Закажи ручки и блокнот')">📦 Канцтовары</button>
            <button class="qr-btn" onclick="send('Нужна корпоративная симка')">📱 SIM-карта</button>
            <button class="qr-btn" onclick="send('Еду в командировку в Питер')">✈️ Командировка</button>
            <button class="qr-btn" onclick="send('Оформи пропуск на парковку')">🅿️ Парковка</button>
            <button class="qr-btn" onclick="send('Такси до Шереметьево')">🚕 Такси</button>
            <button class="qr-btn" onclick="send('Кофемашина не работает')">⚠️ Непорядок!</button>
        `;
    } else if (step === 'confirm') {
        qa.innerHTML = `
            <button class="qr-btn confirm" onclick="send('Да, всё верно')">✅ Подтвердить</button>
            <button class="qr-btn" onclick="send('Нет, нужно изменить')">✏️ Изменить</button>
            <button class="qr-btn cancel" onclick="send('Отмена')">✕ Отмена</button>
        `;
    } else {
        qa.innerHTML = '';
    }
}

// ── Session persistence ───────────────────────────

async function loadHistory(email) {
    if (!email) return;
    try {
        const r = await fetch(`${window.location.origin}/api/history/${encodeURIComponent(email)}`);
        const data = await r.json();
        if (data.messages && data.messages.length > 0) {
            data.messages.forEach(m => addMsg(m.content, m.role === 'user' ? 'user' : 'bot'));
            updateStep(data.step || 'greeting');
            if (data.current_request) {
                document.getElementById('jsonDisplay').textContent = JSON.stringify(data.current_request, null, 2);
            }
        } else {
            addMsg('👋 Привет! Я — бот АХО.\n\nПомогу оформить заявку на канцтовары, SIM-карту, командировку, парковку, такси или сообщить о проблеме.\n\nЧем могу помочь?', 'bot');
        }
    } catch(e) {
        console.error('Failed to load history:', e);
        addMsg('👋 Привет! Я — бот АХО.\n\nПомогу оформить заявку. Чем могу помочь?', 'bot');
    }
}

async function switchEmployee() {
    const email = document.getElementById('empSelect').value;
    currentEmail = email;
    clearChat();
    updateStep('greeting');
    if (email) {
        await loadHistory(email);
    } else {
        addMsg('👋 Привет! Я — бот АХО.\n\nВыбери сотрудника сверху и напиши, что нужно!', 'bot');
    }
}

    if (email) {
        await fetch(`${window.location.origin}/api/reset/${encodeURIComponent(email)}`, { method: 'POST' });
    }
    clearChat();
    updateStep('greeting');
    addMsg('👋 Чат очищен. Чем могу помочь?', 'bot');
}

const TRACE_ICONS = {
    node_enter: { cls: 'node', icon: '▶' },
    llm_call: { cls: 'llm', icon: '🧠' },
    llm_response: { cls: 'llm', icon: '💬' },
    rag_search: { cls: 'rag', icon: '🔎' },
    decision: { cls: 'decision', icon: '⚡' },
    fields_analysis: { cls: 'fields', icon: '📋' },
    fields_update: { cls: 'fields', icon: '✏️' },
    autofill: { cls: 'fields', icon: '👤' },
    agent_delegation: { cls: 'node', icon: '🔀' },
    tool_call: { cls: 'submit', icon: '🔧' },
    tool_result: { cls: 'submit', icon: '📦' },
    submit: { cls: 'submit', icon: '🚀' },
};

const TRACE_LABELS = {
    node_enter: 'Вход в узел',
    llm_call: 'LLM вызов',
    llm_response: 'LLM ответ',
    rag_search: 'RAG поиск',
    decision: 'Решение',
    fields_analysis: 'Анализ полей',
    fields_update: 'Обновление полей',
    autofill: 'Авто-заполнение',
    agent_delegation: 'Делегирование агенту',
    tool_call: 'Вызов инструмента (MCP)',
    tool_result: 'Результат инструмента',
    submit: 'Отправка заявки',
};

function renderTrace(traces) {
    const list = document.getElementById('traceList');
    const placeholder = document.getElementById('tracePlaceholder');
    if (!traces || !traces.length) return;

    placeholder.style.display = 'none';
    msgNum++;

    const sep = document.createElement('div');
    sep.style.cssText = 'padding:6px 0;margin:8px 0;border-bottom:1px solid var(--border);font-size:10px;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:1px;';
    sep.textContent = `Сообщение #${msgNum}`;
    list.appendChild(sep);

    traces.forEach((t, i) => {
        const iconInfo = TRACE_ICONS[t.type] || { cls: 'node', icon: '•' };
        const label = TRACE_LABELS[t.type] || t.type;
        const durText = t.duration_ms > 0 ? `${t.duration_ms}ms` : '';

        const entry = document.createElement('div');
        entry.className = 'trace-entry';
        entry.innerHTML = `
            <div class="trace-header" onclick="this.parentElement.classList.toggle('open')">
                <div class="trace-icon ${iconInfo.cls}">${iconInfo.icon}</div>
                <div class="trace-label">${label}${t.data.node ? ' <span style="color:var(--text-muted)">· ' + t.data.node + '</span>' : ''}</div>
                <div class="trace-duration">${durText}</div>
                <div class="trace-chevron">›</div>
            </div>
            <div class="trace-body">${renderTraceBody(t)}</div>
        `;

        if (['llm_response','decision','submit','fields_update','agent_delegation','tool_call','tool_result'].includes(t.type)) {
            entry.classList.add('open');
        }

        list.appendChild(entry);
    });

    const ds = document.getElementById('debugScroll');
    ds.scrollTop = ds.scrollHeight;
}

function renderTraceBody(t) {
    const d = t.data;
    let html = '';

    switch(t.type) {
        case 'node_enter':
            html += kv('Узел графа', d.node, 'highlight');
            if (d.action) html += kv('Действие', d.action);
            if (d.user_message) html += kv('Сообщение', d.user_message);
            break;

        case 'llm_call':
            html += kv('Задача', d.purpose, 'highlight');
            html += kv('Модель', d.model);
            if (d.agent_system) html += kv('Системный промпт агента', d.agent_system);
            if (d.missing_fields && d.missing_fields.length) html += kv('Ожидаемые поля', d.missing_fields.join(', '));
            if (d.prompt_preview) html += kv('Промпт', d.prompt_preview, 'code');
            break;

        case 'llm_response':
            if (d.parsed) {
                if (d.parsed.agent) html += kv('Агент', d.parsed.agent_label || d.parsed.agent, 'highlight');
                if (d.parsed.confidence) html += kv('Уверенность', (d.parsed.confidence * 100).toFixed(0) + '%', d.parsed.confidence > 0.8 ? 'success' : '');
                if (d.parsed.reasoning) html += kv('Рассуждение', d.parsed.reasoning);
                if (d.parsed.extracted_entities && Object.keys(d.parsed.extracted_entities).length) html += kv('Сущности', JSON.stringify(d.parsed.extracted_entities, null, 2), 'code');
            }
            if (d.guardrails) html += kv('Guardrails', d.guardrails, 'success');
            if (d.extracted_fields && Object.keys(d.extracted_fields).length) html += kv('Извлечённые поля', JSON.stringify(d.extracted_fields, null, 2), 'code');
            if (d.next_question) html += kv('Следующий вопрос', d.next_question);
            if (d.all_collected) html += kv('Все данные собраны', '✅ Да', 'success');
            if (d.raw_response) html += kv('Сырой ответ LLM', d.raw_response, 'code');
            if (d.summary_preview) html += kv('Сводка', d.summary_preview);
            break;

        case 'rag_search':
            html += kv('Запрос', d.query);
            html += kv('Найдено', d.results_count + ' документов');
            if (d.snippets) d.snippets.forEach((s, i) => { html += kv(`Фрагмент ${i+1}`, s, 'code'); });
            break;

        case 'decision':
            html += kv('Действие', d.action, 'highlight');
            if (d.agent) html += kv('Агент', d.agent);
            if (d.question) html += kv('Вопрос', d.question);
            break;

        case 'agent_delegation':
            html += kv('Передано агенту', d.delegated_to, 'highlight');
            html += kv('ID агента', d.agent_id);
            if (d.required_fields) html += kv('Обязательные поля', d.required_fields.join(', '));
            if (d.already_filled && d.already_filled.length) html += kv('Уже заполнены', d.already_filled.join(', '), 'success');
            if (d.missing_fields && d.missing_fields.length) html += kv('Нужно собрать', d.missing_fields.join(', '));
            break;

        case 'fields_update':
            if (d.newly_filled && d.newly_filled.length) html += kv('Заполнены', d.newly_filled.join(', '), 'success');
            if (d.still_missing && d.still_missing.length) html += kv('Ещё нужно', d.still_missing.join(', '));
            html += kv('Состояние заявки', JSON.stringify(d.request_snapshot, null, 2), 'code');
            break;

        case 'autofill':
            html += kv('Сотрудник', d.employee, 'highlight');
            html += kv('Автозаполнено', d.fields_filled.join(', '));
            break;

        case 'tool_call':
            html += kv('Инструмент', d.tool, 'highlight');
            html += kv('Аргументы', JSON.stringify(d.arguments, null, 2), 'code');
            break;

        case 'tool_result':
            html += kv('Инструмент', d.tool, 'highlight');
            html += kv('Статус', d.status, d.status === 'success' ? 'success' : '');
            html += kv('Результат', JSON.stringify(d.result, null, 2), 'code');
            break;

        case 'submit':
            html += kv('ID заявки', d.request_id, 'highlight');
            if (d.tool_used) html += kv('Инструмент', d.tool_used);
            html += kv('Финальный JSON', JSON.stringify(d.final_json, null, 2), 'code');
            break;

        default:
            html += `<pre>${JSON.stringify(d, null, 2)}</pre>`;
    }
    return html;
}

function kv(key, val, cls) {
    if (!val) return '';
    const c = cls || '';
    if (c === 'code') {
        return `<div class="kv"><div class="kv-key">${key}</div><div class="kv-val code">${esc(String(val))}</div></div>`;
    }
    return `<div class="kv"><div class="kv-key">${key}</div><div class="kv-val ${c}">${esc(String(val))}</div></div>`;
}

// ── Send ──────────────────────────────────────────

async function send(text) {
    if (!text.trim()) return;
    addMsg(text, 'user');
    showTyping();

    const email = document.getElementById('empSelect').value || null;

    try {
        const r = await fetch(API, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ session_id: sessionId, message: text, employee_email: email }),
        });
        const data = await r.json();
        hideTyping();

        sessionId = data.session_id;
        addMsg(data.response, 'bot');
        updateStep(data.step);

        if (data.debug_trace) renderTrace(data.debug_trace);
        if (data.current_request) {
            document.getElementById('jsonDisplay').textContent = JSON.stringify(data.current_request, null, 2);
        }
        document.getElementById('stateDisplay').textContent = JSON.stringify({
            session_id: data.session_id,
            step: data.step,
            current_intent: data.current_intent,
            current_request: data.current_request,
        }, null, 2);

    } catch(e) {
        hideTyping();
        addMsg('❌ Ошибка соединения. Убедись, что сервер запущен.', 'bot');
        console.error(e);
    }
}

function sendFromInput() {
    const inp = document.getElementById('msgInput');
    send(inp.value);
    inp.value = '';
}
